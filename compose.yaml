services:
  fast_api_database:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5436:5432"

  fast_api_app:
    image: fast_api_app
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - fast_api_database
    environment:
      - DATABASE_URL=postgresql+psycopg://app_user:app_password@fast_api_database:5432/app_db

volumes:
  postgres_data: